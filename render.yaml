services:
  - type: web
    name: zkplosers
    runtime: node
    buildCommand: npm install && npm run build && cd server && npm install && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_WS_URL
        value: wss://zkplosers.onrender.com
      - key: FRONTEND_ORIGIN
        value: https://zkplosers.onrender.com
    plan: free
